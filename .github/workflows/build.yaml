name: Build
on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: npm install
        run: |
          npm install

      - name: npm run all
        run: |
          npm run all

      - name: Commit Check (builtin SimpleTag)
        uses: ./
        with:
          validator: "simpletag"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit Check (builtin RegEx)
        if: success() || failure()
        uses: ./
        with:
          validator: "regex"
          options: |
            summary: ".*"
            description: ".*"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit Check (custom validator)
        if: success() || failure()
        uses: ./
        with:
          validator_file: "example/simpletag.mjs"
        env:
          GITHUB_TOKEN: ${{ github.token }}
